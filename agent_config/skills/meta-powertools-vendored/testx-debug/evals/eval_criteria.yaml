            3: "Noticed inconsistent results but didn't clearly label as flaky"
            2: "Missed the flaky nature despite seeing both PASSED and FAILED results"
            1: "Completely missed that this is a flaky test"
        - question: "Did the skill identify the root cause (floating-point tolerance issue)?"
          weight: 2
          rubric:
            5: "Correctly identified tolerance issue in EXPECT_NEAR, explained floating-point precision"
            4: "Identified tolerance as an issue but explanation incomplete"
            3: "Mentioned tolerance but not as primary root cause"
            2: "Misidentified root cause"
            1: "Failed to identify any root cause"
        - question: "Did the skill provide a concrete fix recommendation and mention the stress_run_cmd for verification?"
          weight: 2
