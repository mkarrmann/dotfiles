  - id: TC-004
    name: "Business impact - full workflow for realistic flaky test"
    category: business_impact
    prompt: "/testx-debug https://www.internalfb.com/intern/test/7777777777"
    description: "Tests the skill's actual business impact: can it complete a realistic investigation that saves engineering time?"
    expected_behavior: "Skill completes full investigation workflow: fetch data, compare PASSED/FAILED, identify root cause, provide fix recommendations, verify with stress test command"
    eval_target: response
    project: testx-debug
    target_skills:
      - "fbcode/claude-templates/components/skills/testx-debug/SKILL.md"
    mock_data: |
      TestX Test ID: 7777777777
      Test name: fbcode//xr/rendering:shader_test - ShaderTest.testLightingCalculation
      Status: FAILED (flaky - sometimes passes)
      Run command: buck2 test fbcode//xr/rendering:shader_test -- ShaderTest.testLightingCalculation
      Stress run command: buck2 test fbcode//xr/rendering:shader_test -- ShaderTest.testLightingCalculation --stress-runs 100

      Recent results (fetched from run_results_without_details with previous_attempts):
      - Top-level result:
        result_id: 9851624324801540.7777777777.1767689810
        status: PASSED
        previous_attempts:
          - result_id: 9851624324801540.7777777777.1767689809
            status: FAILED
            detail: |
              AssertionError: Lighting value mismatch
              Expected: 0.850
              Actual: 0.849
              at ShaderTest.testLightingCalculation (shader_test.cpp:78)

      - Earlier result:
        result_id: 9851624324801539.7777777777.1767689808
        status: FAILED
        detail: |
          AssertionError: Lighting value mismatch
              Expected: 0.850
              Actual: 0.851
              at ShaderTest.testLightingCalculation (shader_test.cpp:78)

      - Working baseline:
        result_id: 9851624324801538.7777777777.1767689807
        status: PASSED

      Diagnostics: everstore://diag-flaky-1
      Logs: everstore://log-rendering-1, everstore://log-rendering-2

      Test source (shader_test.cpp):
      ```cpp
      TEST_F(ShaderTest, testLightingCalculation) {
        float result = calculateLighting(lightPos, surfaceNormal);
        EXPECT_NEAR(result, 0.850, 0.001);  // Tolerance: 0.001
      }
      ```

      Root cause: The test uses EXPECT_NEAR with tolerance 0.001, but the calculated lighting
      values are 0.849 and 0.851 which are within floating-point precision limits.
      The test should use a larger tolerance (0.01) or use a fixed random seed for deterministic results.
    intercept_patterns:
      - "meta graphql.query"
      - "testx --caller"
      - "clowder get"
    quality_criteria:
      required_present:
        - "7777777777"
        - "flaky"
        - "tolerance"
        - "stress"
      required_absent:
        - "I cannot"
