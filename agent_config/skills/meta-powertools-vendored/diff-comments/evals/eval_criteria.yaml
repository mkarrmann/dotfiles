      flag to create a Phabricator code suggestion (Accept button UI), since the meta CLI
      does not yet support --suggested.
    expected_behavior: >
      Run inline_comment.py with D96680869, the file path, line 95, --draft,
      --message with the comment text, and --suggested with the replacement code.
    eval_target: tool_usage
    target_skills:
      - "fbcode/claude-templates/components/skills/diff-comments/SKILL.md"
