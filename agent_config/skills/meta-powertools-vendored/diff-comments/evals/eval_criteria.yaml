# Evaluation criteria for diff-comments skill
# Focus: Mocking comment submission on D92988128
# Mode: THOROUGH (12 test cases, 5 dimensions)
# Generated: 2026-03-04
# Updated: 2026-03-31 — migrated from Python scripts to meta phabricator.diff CLI

project: diff-comments
default_working_directory: "~/fbsource"

test_cases:

  # ============================================================================
  # INVOCATION (2 tests — 20%)
  # ============================================================================

  - id: TC-001
    name: "Natural language general comment submission"
    category: invocation
    prompt: >
      I want to leave a comment on diff D92988128 saying the implementation looks good
      and the tests are comprehensive.
    description: >
      Tests that the diff-comments skill activates from natural language without explicit
      /diff-comments invocation. The prompt mentions commenting on a diff, which should
      trigger the skill and route to meta phabricator.diff comment.
    expected_behavior: >
      The skill should activate, identify D92988128 as the target diff, and run
      meta phabricator.diff comment with the appropriate message. The comment should be
      submitted successfully (mocked).
    eval_target: tool_usage
    target_skills:
      - "fbcode/claude-templates/components/skills/diff-comments/SKILL.md"
    mock_data: |
      Environment: Phabricator diff D92988128 exists and is accessible.
      Diff title: "Add FlowJobCreationGradingStrategy with FBLearner verification"
      Author: hadleym
      Status: Closed

      When meta phabricator.diff comment is executed with -n D92988128 and -m argument:
        stdout: "Comment added to D92988128."
        exit_code: 0
    intercept_patterns:
      - "phabricator.diff comment "
    quality_criteria:
      required_present: ["phabricator.diff comment", "D92988128"]
      required_absent: ["error", "I cannot", "inline-comment"]
      semantic_checks:
        - question: "Did the skill activate from natural language without explicit /diff-comments invocation?"
          weight: 3
          rubric:
            5: "Activated immediately from natural language, identified diff and message, ran correct command"
            4: "Activated correctly but asked for one minor clarification before proceeding"
            3: "Activated but required re-prompting or explicit skill mention"
            2: "Recognized the intent but used the wrong command or approach"
            1: "Did not activate the diff-comments skill at all"
        - question: "Did the skill correctly identify the diff number and route to meta phabricator.diff comment?"
          weight: 2
          rubric:
            5: "Correctly parsed D92988128 and used meta phabricator.diff comment with proper arguments"
            4: "Used the correct command but minor argument formatting issues"
            3: "Used the correct command but needed to retry with corrected arguments"
            2: "Used the wrong command (e.g., inline-comment instead of comment)"
            1: "Did not invoke any diff-comments command"
      artifact_checks: []

  - id: TC-002
    name: "Natural language inline comment submission"
    category: invocation
    prompt: >
      Can you add a note on line 25 of flow_job_creation_grading_strategy.py in diff
      D92988128 suggesting that the docstring should mention the scoring values?
    description: >
      Tests natural language activation with inline comment parameters. The prompt
      mentions a specific file and line number, which should trigger
      meta phabricator.diff inline-comment.
    expected_behavior: >
      The skill should activate, parse the file path and line number from the prompt,
      and submit the inline comment via meta phabricator.diff inline-comment.
    eval_target: tool_usage
    target_skills:
      - "fbcode/claude-templates/components/skills/diff-comments/SKILL.md"
    mock_data: |
      Environment: Phabricator diff D92988128 exists.
      Diff files:
        - fbcode/ai_productivity/benchmarks/ads/agent_evaluation/grading_strategy/flow_job_creation_grading_strategy.py
        - fbcode/ai_productivity/benchmarks/ads/agent_evaluation/grading_strategy/grading_strategy_factory.py
        - fbcode/ai_productivity/benchmarks/ads/agent_evaluation/grading_strategy/tests/test_flow_job_creation_grading_strategy.py
        - fbcode/ai_productivity/benchmarks/ads/agent_evaluation/grading_strategy/tests/BUCK
        - fbcode/ai_productivity/benchmarks/ads/agent_evaluation/grading_strategy/BUCK
        - fbcode/ai_productivity/benchmarks/ads/agent_evaluation/evaluation_datasets/mlea/test_flow_job_submission.json
        - fbcode/ai_productivity/benchmarks/BUCK
        - fbcode/ai_productivity/benchmarks/graders/flow_job_creation_grader.py

