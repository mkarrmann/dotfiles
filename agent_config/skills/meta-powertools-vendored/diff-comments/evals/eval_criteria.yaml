  # ============================================================================
  # EFFICIENCY (1 test — 10%)
  # ============================================================================

  - id: TC-003
    name: "Efficient simple comment submission"
    category: efficiency
    prompt: >
      /diff-comments Add a general comment on D92988128 saying "All feedback has been addressed,
      tests pass. Ready for re-review."
    description: >
      Tests that a simple general comment is submitted with minimal tool calls and token
      usage. Should be a single meta CLI invocation with no unnecessary queries.
    expected_behavior: >
      The skill should directly run meta phabricator.diff comment with the message.
      No need to query comments first, no subagents, no extra file reads. One Bash call.
    eval_target: tool_usage
    target_skills:
      - "fbcode/claude-templates/components/skills/diff-comments/SKILL.md"
    mock_data: |
      When meta phabricator.diff comment is executed with -n D92988128 and -m containing "All feedback has been addressed":
        stdout: "Comment added to D92988128."
        exit_code: 0
    intercept_patterns:
      - "phabricator.diff comment "
    quality_criteria:
      required_present: ["phabricator.diff comment", "D92988128"]
      required_absent: ["phabricator.diff comments", "get_comment_status", "inline-comment", "error"]
      semantic_checks:
        - question: "Was the comment submitted with a single tool call (no unnecessary queries or subagents)?"
          weight: 3
          rubric:
            5: "Single Bash call to meta phabricator.diff comment, no extraneous tool calls, immediate completion"
            4: "One Bash call plus one Read of the skill file, no other extras"
            3: "Two Bash calls (e.g., queried comments first unnecessarily) but completed quickly"
            2: "Multiple unnecessary tool calls or subagents launched for a simple task"
            1: "Spawned subagents, made 5+ tool calls, or took excessive tokens for a one-line comment"
        - question: "Was the output concise and proportionate to the simple task?"
          weight: 1
          rubric:
            5: "Brief confirmation of success, no verbose explanations"
            4: "Short response with minor extra context"
            3: "Moderate response with some unnecessary detail"
            2: "Verbose response for a simple operation"
            1: "Extremely long output for a one-line comment"
      artifact_checks: []

