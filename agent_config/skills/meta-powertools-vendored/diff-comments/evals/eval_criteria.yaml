        stdout: "Inline comment added to D92988128 on fbcode/ai_productivity/benchmarks/ads/agent_evaluation/grading_strategy/flow_job_creation_grading_strategy.py:25"
        exit_code: 0
    intercept_patterns:
      - "phabricator.diff inline-comment"
    quality_criteria:
      required_present: ["phabricator.diff inline-comment", "D92988128", "flow_job_creation_grading_strategy.py", "25"]
      required_absent: ["error", "I cannot", "not found"]
      semantic_checks:
        - question: "Did the skill correctly parse the file path and line number from the natural language prompt?"
          weight: 3
          rubric:
            5: "Correctly identified both file path and line 25 from natural language, passed to inline-comment"
            4: "Identified file and line but needed to search for the exact file path first"
            3: "Identified the file but guessed at the exact path format"
            2: "Got the line number but wrong file"
            1: "Could not parse file or line from the prompt"
        - question: "Did the skill use inline-comment rather than comment?"
          weight: 2
          rubric:
            5: "Correctly chose inline-comment based on the file/line context in the prompt"
            4: "Chose inline-comment after brief deliberation"
            3: "Initially considered comment but corrected to inline-comment"
            2: "Used comment instead (wrong command for inline comment)"
            1: "Did not invoke any diff-comments command"
