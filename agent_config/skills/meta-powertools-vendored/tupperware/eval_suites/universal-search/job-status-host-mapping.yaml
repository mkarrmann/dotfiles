id: job-status-host-mapping
suite: universal-search
project: tupperware-evals
name: "Job Status & Host Mapping"
category: core
question: |
  What commands and approach would you use to: What's the status of job tsp_global/tupperware/universal_search.prod? What tasks are running and on which hosts?
expected_behavior: |
  Agent should use Universal Search Job lookup then Tasks by association. Validates query-task.md fields and association filters.
eval_target: response
target_skills:
  - fbcode/claude-templates/components/skills/tupperware/SKILL.md
quality_criteria:
  semantic_checks:
    - question: "Uses Universal Search Job lookup (from:1, idFilter)?"
      weight: 3
      rubric:
        5: "Fully satisfies the criterion"
        3: "Partially satisfies"
        1: "Does not satisfy"
    - question: "Uses Tasks by association (from:4, assocObjectType:1)?"
      weight: 3
      rubric:
        5: "Fully satisfies the criterion"
        3: "Partially satisfies"
        1: "Does not satisfy"
    - question: "Extracts task states and hostnames from results?"
      weight: 1
      rubric:
        5: "Fully satisfies the criterion"
        3: "Partially satisfies"
        1: "Does not satisfy"
