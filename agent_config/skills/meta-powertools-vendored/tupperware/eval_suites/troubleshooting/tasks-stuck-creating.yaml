id: tasks-stuck-creating
suite: troubleshooting
project: tupperware-evals
name: "Q27: Tasks Stuck Creating"
category: troubleshooting
question: |
  What commands and approach would you use to: I started tsp_global/tupperware/universal_search.prod but tasks have been stuck in CREATING for 30 minutes. They never transition to RUNNING. What's blocking them?
expected_behavior: |
  Agent should check tupperware_task_events for CONTAINER_CREATION_FAILED, diagnose package fetch or spec validation issues.
eval_target: response
target_skills:
  - fbcode/claude-templates/components/skills/tupperware/SKILL.md
quality_criteria:
  semantic_checks:
    - question: "Agent correctly routed to the right troubleshooting category and runbook?"
      weight: 3
      rubric:
        5: "Correct category routing on first try"
        3: "Eventually found the right category"
        1: "Wrong category or no routing"
    - question: "Agent provided actionable resolution steps?"
      weight: 3
      rubric:
        5: "Clear, correct resolution with specific commands"
        3: "Partial resolution"
        1: "No resolution or wrong steps"
    - question: "Agent used correct CLI and Scuba commands (no nonexistent subcommands)?"
      weight: 2
      rubric:
        5: "All commands correct"
        3: "Most commands correct"
        1: "Multiple wrong commands"
