eval_mode: basic
default_working_directory: ~/fbsource
project: ci-signals
target_skills:
  - fbcode/claude-templates/components/skills/ci-signals/SKILL.md

test_cases:
  - id: TC-001
    name: "Natural language CI triage invocation"
    category: invocation
    prompt: "My diff D99999999 has some failing tests and lint issues, can you check what's going on with CI?"
    description: "Tests that the skill activates from a natural language request about CI failures without explicit /ci-signals invocation"
    expected_behavior: "The skill should activate and use analyze_ci_signals or query_ci_signals to check the diff's CI status"
    eval_target: response
    target_skills:
      - fbcode/claude-templates/components/skills/ci-signals/SKILL.md
    mock_data: |
      Diff: D99999999
      CI State: TEST_FINISHED_WITH_FAILURES
      Signal counts: total=42, passed=38, failed=3, warning=1, pending=0, info=0
      Failed signals:
        - name: "arc-lint"
          type: STATIC_ANALYSIS
          status: FAILED
          detail: "3 lint issues found in FooBar.java: line 42 unused import, line 88 missing annotation, line 120 type mismatch"
        - name: "FooBarTest"
          type: TEST
          status: FAILED
          detail: "java.lang.AssertionError: expected true but was false at FooBarTest.testWidget(FooBarTest.java:55)"
          repro: "buck test fbsource//fbandroid/javatests/com/instagram/foo:FooBarTest"
        - name: "BazQuxTest"
          type: TEST
          status: FAILED
          detail: "WARNING: ThreadSanitizer: data race at BazQux.cpp:123"
          repro: "buck test fbcode//instagram/server/baz:BazQuxTest"
      Warning signals:
        - name: "Confucius Comment"
          type: REVIEW_INSIGHTS
          status: WARNING
          detail: "Summary: Variable shadowing detected in FooBar.java"
    intercept_patterns:
      - "scripts/analyze_ci_signals"
      - "scripts/query_ci_signals"
      - "scripts/check_ci_state"
      - "scripts/fetch_test_details"
      - "scripts/start_deferred_tests"
      - "scripts/query_review_insights"
      - "meta graphql.query"
      - "jf diff-properties"
    quality_criteria:
      required_present: ["FAILED", "arc-lint", "FooBarTest", "reproduce", "triage"]
      required_absent: ["I cannot", "I don't have access", "error executing"]
      semantic_checks:
        - question: "Did the skill activate from natural language without explicit /ci-signals invocation?"
          weight: 3
          rubric:
            5: "Skill activated immediately, recognized CI query intent, began analysis"
            4: "Skill activated with minor delay or one confirmation step"
            3: "Skill activated but required re-prompting or explicit invocation"
            2: "Partial activation — recognized intent but used wrong tool"
            1: "Did not activate — gave generic response or asked user to run commands manually"
        - question: "Did the response identify the specific failing signals and their types?"
          weight: 2
          rubric:
            5: "Listed all 3 failed signals with types (STATIC_ANALYSIS, TEST) and details"
            4: "Listed most failures with types"
            3: "Listed some failures but missed types or details"
            2: "Only mentioned failure count without specifics"
            1: "Did not identify any failing signals"
        - question: "Did the response include actionable reproduce commands?"
          weight: 2
          rubric:
            5: "Provided specific buck test commands for each failing test"
            4: "Provided reproduce commands for most failures"
            3: "Mentioned reproduce commands exist but didn't extract them"
            2: "Suggested generic debugging steps"
            1: "No reproduce commands or debugging guidance"
      artifact_checks: []

  - id: TC-002
    name: "CI signals efficiency check"
    category: efficiency
    prompt: "/ci-signals D99999999 --triage"
    description: "Tests that the skill handles a simple triage request efficiently without unnecessary tool calls. Behavioral: verifies the user's --triage flag is preserved through to the actual Bash invocation, not just discussed in prose."
    expected_behavior: "Should invoke analyze_ci_signals with --triage flag directly (single Bash call, flag preserved), not fetch unnecessary details or run multiple queries"
    eval_target: tool_usage
    target_skills:
      - fbcode/claude-templates/components/skills/ci-signals/SKILL.md
    mock_data: |
      Diff: D99999999
      CI State: TEST_FINISHED_ALL_PASSED
      Signal counts: total=50, passed=50, failed=0, warning=0, pending=0, info=0
      No failures or warnings found.
    intercept_patterns:
      - "scripts/analyze_ci_signals"
      - "scripts/query_ci_signals"
      - "scripts/check_ci_state"
      - "scripts/fetch_test_details"
      - "scripts/start_deferred_tests"
      - "scripts/query_review_insights"
      - "meta graphql.query"
      - "jf diff-properties"
    quality_criteria:
      required_present: ["passed", "signals"]
      required_absent: ["error", "I cannot"]
      semantic_checks:
        - question: "Did the skill use analyze_ci_signals --triage as the primary command without unnecessary additional queries?"
          weight: 3
          rubric:
            5: "Used analyze_ci_signals --triage directly, reported results concisely"
            4: "Used the right script but added one minor extra query"
            3: "Used the right script but also ran unnecessary fetch_test_details or review_insights"
            2: "Used multiple scripts when one would suffice"
            1: "Used raw GraphQL or multiple redundant queries instead of the script"
        - question: "Was the output concise and proportionate to the result (all passed)?"
          weight: 2
          rubric:
            5: "Brief confirmation that all signals passed, no verbose output"
            4: "Slightly verbose but still focused"
            3: "Included unnecessary details for an all-passed result"
            2: "Very verbose, re-stated the entire skill documentation"
            1: "Massive output for a simple all-passed result"
        - question: "Did the response avoid loading unnecessary skill sections (polling, stack fixing, raw GraphQL)?"
          weight: 2
          rubric:
            5: "Only referenced triage workflow, no mention of advanced sections"
            4: "Briefly mentioned one advanced section but didn't execute it"
            3: "Referenced multiple advanced sections unnecessarily"
            2: "Attempted to use advanced workflows for a simple triage"
            1: "Loaded and executed complex workflows for a trivial task"
        - question: "Did the actual Bash invocation preserve the user's --triage flag (not just talk about it)?"
          weight: 3
          rubric:
            5: "Invoked analyze_ci_signals with --triage flag exactly once; no other scripts called"
            4: "Invoked analyze_ci_signals with --triage flag plus one minor extra call"
            3: "Invoked analyze_ci_signals WITHOUT the --triage flag (full analysis when triage was requested)"
            2: "Invoked analyze_ci_signals --triage but also fired multiple unnecessary scripts"
            1: "Did not invoke analyze_ci_signals at all (used wrong script or only narrated)"
      artifact_checks: []

  - id: TC-003
    name: "Best practices for CI signal analysis"
    category: best_practices
    prompt: "I need to understand why my diff is failing CI. The diff number is D99999999. Can you look at the signals and tell me what to fix?"
    description: "Tests that the skill follows best practices: uses scripts over raw GraphQL, progressive disclosure, proper error classification"
    expected_behavior: "Should use analyze_ci_signals first, classify failures by type, suggest fixes in priority order"
    eval_target: response
    target_skills:
      - fbcode/claude-templates/components/skills/ci-signals/SKILL.md
    mock_data: |
      Diff: D99999999
      CI State: TEST_FINISHED_WITH_FAILURES
      Signal counts: total=60, passed=52, failed=5, warning=3, pending=0, info=0
      Failed signals:
        - name: "fbsource-target-determinator"
          type: JOB
          status: FAILED
          detail: "CISignalBoxBuildDetail - no inline detail available"
        - name: "arc-lint"
          type: STATIC_ANALYSIS
          status: FAILED
          detail: "5 lint issues: 2 in FooBar.java (unused import, missing @Override), 3 in BazQux.kt (naming convention)"
        - name: "FooBarTest"
          type: TEST
          status: FAILED
          detail: "0 sub results - sanitize_report"
          repro: "buck test fbsource//fbandroid/javatests/com/instagram/foo:FooBarTest"
        - name: "IntegrationTest"
          type: TEST
          status: FAILED
          detail: "java.lang.NullPointerException at IntegrationTest.java:88"
          repro: "buck test fbsource//fbandroid/javatests/com/instagram/integration:IntegrationTest"
        - name: "BuildRuleCheck"
          type: BUILD_RULE
          status: FAILED
          detail: "Missing dependency: //third-party/java/guava:guava not in BUCK file"
          repro: "buck build fbsource//fbandroid/java/com/instagram/foo:foo"
      Warning signals:
        - name: "Confucius Comment"
          type: REVIEW_INSIGHTS
          status: WARNING
        - name: "AI Test Quality"
          type: REVIEW_INSIGHTS
          status: WARNING
        - name: "lint-infer-www-hack"
          type: STATIC_ANALYSIS
          status: WARNING
    intercept_patterns:
      - "scripts/analyze_ci_signals"
      - "scripts/query_ci_signals"
      - "scripts/check_ci_state"
      - "scripts/fetch_test_details"
      - "scripts/start_deferred_tests"
      - "scripts/query_review_insights"
      - "meta graphql.query"
      - "jf diff-properties"
    intercept_mcp_tools:
      - "mcp__plugin_meta_mux__get_phabricator_diff_details"
    quality_criteria:
      required_present: ["STATIC_ANALYSIS", "TEST", "BUILD_RULE", "JOB", "reproduce", "fix"]
      required_absent: ["I cannot", "error executing"]
      semantic_checks:
        - question: "Did the skill use scripts/analyze_ci_signals as the primary entry point instead of raw GraphQL?"
          weight: 3
          rubric:
            5: "Used analyze_ci_signals as first step, followed skill's recommended workflow"
            4: "Used analyze_ci_signals with minor deviations"
            3: "Used query_ci_signals instead but still got results"
            2: "Used raw GraphQL for initial query"
            1: "Didn't use any of the skill's scripts"
        - question: "Did the skill correctly handle the JOB signal with 'no inline detail' by suggesting get_phabricator_diff_details?"
          weight: 3
          rubric:
            5: "Recognized CISignalBoxBuildDetail limitation, suggested get_phabricator_diff_details with include_failing_ci_signals=true"
            4: "Recognized the limitation, suggested alternative approach"
            3: "Noted the JOB failure but didn't escalate to get_phabricator_diff_details"
            2: "Dismissed the JOB failure as 'infrastructure issue'"
            1: "Ignored the JOB failure entirely"
        - question: "Did the skill recognize the sanitize_report test failure and suggest fetch_test_details for TSAN/ASAN logs?"
          weight: 2
          rubric:
            5: "Recognized sanitize_report, suggested fetch_test_details --status FAILED --limit 5 and grep for ThreadSanitizer/AddressSanitizer"
            4: "Recognized sanitize_report, suggested fetch_test_details"
            3: "Noted the test failure but didn't connect to sanitizer artifacts"
            2: "Only showed the reproduce command without addressing sanitize_report"
            1: "Ignored the sanitize_report detail"
        - question: "Did the response prioritize fixes appropriately (e.g., BUILD_RULE before TEST)?"
          weight: 2
          rubric:
            5: "Clear priority order with rationale (e.g., fix BUILD_RULE first as it may cascade)"
            4: "Suggested a reasonable fix order"
            3: "Listed all fixes without priority"
            2: "Focused on minor issues before critical ones"
            1: "No fix recommendations"
      artifact_checks: []

