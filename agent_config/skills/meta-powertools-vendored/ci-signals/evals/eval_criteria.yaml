  - id: TC-009
    name: "Previous version CI querying"
    category: best_practices
    prompt: "I just resubmitted D99999999 and the new version shows 0 failures but CI is still running. The previous version had 3 failures. Did my fix work?"
    description: "Tests that the skill knows to check previous version CI for comparison and doesn't assume 0 failures on a running version means success"
    expected_behavior: "Should warn that 0 failures on IN_PROGRESS CI is not conclusive, suggest checking previous version's completed CI for comparison, and explain how to query previous versions"
    eval_target: response
    target_skills:
      - fbcode/claude-templates/components/skills/ci-signals/SKILL.md
    mock_data: |
      Diff: D99999999
      Current version (V3):
        CI State: TEST_IN_PROGRESS_WITH_NO_FAILURES
        Signal counts: total=40, passed=12, failed=0, warning=0, pending=28, info=0
      Previous version (V2):
        CI State: TEST_FINISHED_WITH_FAILURES
        Signal counts: total=40, passed=37, failed=3, warning=0, pending=0, info=0
        Failed signals:
          - name: "CoreTest" type: TEST detail: "AssertionError at CoreTest.java:42"
          - name: "UtilTest" type: TEST detail: "NullPointerException at UtilHelper.java:88"
          - name: "arc-lint" type: STATIC_ANALYSIS detail: "2 lint issues"
      Version history: V1 (id=111), V2 (id=222), V3 (id=333, current)
    intercept_patterns:
      - "scripts/analyze_ci_signals"
      - "scripts/query_ci_signals"
      - "scripts/check_ci_state"
      - "scripts/fetch_test_details"
      - "scripts/start_deferred_tests"
      - "scripts/query_review_insights"
      - "meta graphql.query"
      - "jf diff-properties"
    quality_criteria:
      required_present: ["pending", "previous", "version"]
      required_absent: ["fix worked", "all passing"]
      semantic_checks:
        - question: "Did the skill warn that 0 failures with 28 pending signals is NOT conclusive?"
          weight: 3
          rubric:
            5: "Explicitly stated that 0 failures with 28 pending signals means tests haven't run yet, not that they passed — loaded the polling or previous_versions reference"
            4: "Warned about pending signals making the result inconclusive"
            3: "Mentioned pending signals but was ambiguous"
            2: "Implied the fix likely worked based on current results"
            1: "Declared the fix worked because there are 0 failures"
        - question: "Did the skill explain how to query the previous version's CI for comparison?"
          weight: 3
          rubric:
            5: "Explained using author_relevant_phabricator_versions to list versions, then querying signalview_signals with the previous version ID — or referenced the previous_versions guide"
            4: "Suggested checking previous version CI with some detail on how"
            3: "Mentioned previous version exists but didn't explain how to query it"
            2: "Only focused on the current version"
            1: "Didn't mention previous versions at all"
        - question: "Did the skill suggest waiting for current CI to complete before drawing conclusions?"
          weight: 2
          rubric:
            5: "Recommended waiting for V3 CI to complete, suggested using check_ci_state to monitor, and said to compare results against V2 failures once done"
            4: "Suggested waiting and re-checking"
            3: "Mentioned waiting but no specific plan"
            2: "Suggested immediate action based on incomplete data"
            1: "No follow-up recommendation"
      artifact_checks: []

