  - id: TC-008
    name: "Stack fixing — bottom-up methodology"
    category: best_practices
    prompt: "I have a stack of 3 diffs (D99999997, D99999998, D99999999) and they all have CI failures. How should I approach fixing them?"
    description: "Tests that the skill recommends bottom-up stack fixing methodology, explains version dynamics, and loads the stack_fixing reference"
    expected_behavior: "Should recommend fixing the bottom diff first, explain that fixes cascade upward, mention version dynamics for bumped diffs, and reference the stack_fixing guide"
