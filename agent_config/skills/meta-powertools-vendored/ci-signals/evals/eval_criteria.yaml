  - id: TC-005
    name: "Polling workflow with pending signals"
    category: best_practices
    prompt: "I submitted D99999999 and need to know when CI is done. Can you monitor it and tell me when it finishes?"
    description: "Tests that the skill uses check_ci_state for polling, advises on sleep intervals, handles TEST_DEFERRED state, and correctly interprets pending vs zero-failure states. Behavioral: verifies the polling tool is actually invoked (check_ci_state, not analyze_ci_signals which is overkill for polling)."
    expected_behavior: "Should invoke check_ci_state (the prescribed <5s polling tool), NOT analyze_ci_signals (heavier full-analysis tool). Should suggest sleep intervals (60-120s), recognize pending signals mean CI is incomplete, and load the polling_workflow reference."
    eval_target: tool_usage
    target_skills:
      - fbcode/claude-templates/components/skills/ci-signals/SKILL.md
    mock_data: |
      Diff: D99999999
      CI State: TEST_IN_PROGRESS_WITH_NO_FAILURES
      Signal counts: total=35, passed=20, failed=0, warning=0, pending=15, info=0
      No failures or warnings found yet. 15 signals still pending.
    intercept_patterns:
      - "scripts/analyze_ci_signals"
      - "scripts/query_ci_signals"
      - "scripts/check_ci_state"
      - "scripts/fetch_test_details"
      - "scripts/start_deferred_tests"
      - "scripts/query_review_insights"
      - "meta graphql.query"
      - "jf diff-properties"
    quality_criteria:
      required_present: ["pending", "check_ci_state", "wait"]
      required_absent: ["all passed", "CI is green", "no failures"]
      semantic_checks:
        - question: "Did the skill use check_ci_state (not analyze_ci_signals) as the primary polling command?"
          weight: 3
          rubric:
            5: "Used check_ci_state as the fast polling command, explained it's the best tool for monitoring"
            4: "Used check_ci_state but also ran analyze_ci_signals unnecessarily"
            3: "Used analyze_ci_signals instead of check_ci_state for polling"
            2: "Used raw GraphQL for polling"
            1: "Didn't attempt any CI state check"
        - question: "Did the skill correctly identify that 0 failures with 15 pending signals does NOT mean CI passed?"
          weight: 3
          rubric:
            5: "Explicitly warned that 0 failures is misleading — 15 signals are still pending, CI is not complete"
            4: "Noted CI is in progress and not yet conclusive"
            3: "Mentioned pending signals but was ambiguous about pass/fail status"
            2: "Implied things look good because no failures so far"
            1: "Declared CI passed because there are 0 failures"
        - question: "Did the skill suggest appropriate sleep intervals and a polling approach?"
          weight: 2
          rubric:
            5: "Suggested 60-120s sleep intervals, offered to re-check, or loaded the polling_workflow reference for a full automated pattern"
            4: "Suggested a reasonable wait time and offered to re-check"
            3: "Suggested waiting but with no specific interval"
            2: "Offered to check again immediately without waiting"
            1: "No follow-up plan for monitoring CI progress"
        - question: "Did the actual Bash invocation use check_ci_state (the lightweight polling tool) and NOT analyze_ci_signals (which is overkill for monitoring)?"
          weight: 3
          rubric:
            5: "Invoked check_ci_state exactly; did not invoke analyze_ci_signals"
            4: "Invoked check_ci_state primarily; one minor extra call"
            3: "Invoked check_ci_state plus an unnecessary analyze_ci_signals call (right tool but wasted a heavy call)"
            2: "Invoked analyze_ci_signals instead of check_ci_state for polling"
            1: "Did not invoke any CI state script (only narrated, used raw GraphQL, or wrong script entirely)"
      artifact_checks: []

