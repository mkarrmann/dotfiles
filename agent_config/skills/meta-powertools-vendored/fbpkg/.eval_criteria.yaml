# Evaluation Criteria for fbpkg Skill
# Generated: 2026-02-19
# Thoroughness: Comprehensive (30 test cases)

default_working_directory: ~/fbsource/fbcode

test_cases:
  # ============================================================
  # HAPPY PATH (30-40%): 10 test cases
  # Standard invocations matching the skill description
  # ============================================================

  - id: TC-001
    name: "Basic package info query"
    category: happy_path
    prompt: "Show me info for the fbpkg package 'pytorch'"
    description: "Tests basic fbpkg info command execution"
    expected_behavior: "Executes 'fbpkg info pytorch' and returns package metadata"
    eval_target: response
    quality_criteria:
      required_present:
        - "fbpkg info"
        - "pytorch"
      required_absent:
        - "I cannot"
        - "error"
        - "permission denied"
      semantic_checks:
        - question: "Did the response execute the fbpkg info command?"
          weight: 3
        - question: "Does the output include package metadata fields (ACL, Version Limit, etc.)?"
          weight: 2
      artifact_checks: []
    timeout_seconds: 120
    max_budget_usd: 3.0

  - id: TC-002
    name: "List package versions with limits"
    category: happy_path
    prompt: "What are the recent versions of the package 'metalearner'?"
    description: "Tests that skill auto-adds version limits to avoid timeouts"
    expected_behavior: "Executes 'fbpkg versions metalearner --ephemeral-limit 50 --regular-limit 50'"
    eval_target: response
    quality_criteria:
      required_present:
        - "fbpkg versions"
        - "ephemeral-limit"
        - "regular-limit"
        - "metalearner"
      required_absent:
        - "timeout"
        - "I cannot"
      semantic_checks:
        - question: "Did the skill automatically add --ephemeral-limit and --regular-limit flags?"
          weight: 3
        - question: "Does the output show a list of versions?"
          weight: 2
      artifact_checks: []
    timeout_seconds: 120
    max_budget_usd: 3.0

