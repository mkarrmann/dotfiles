id: cq-dataset-discovery-004
suite: core-queries
project: scuba-evals
description: Tests the full discovery pipeline from meta scuba.dataset search through meta scuba.dataset info to meta scuba.dataset query
target_skills:
  - claude-templates/components/skills/scuba/SKILL.md

scenario: "A user doesn't know the exact dataset name and needs to discover it."
question: "I want to analyze Scuba query performance data. Help me find the right dataset, explore its schema, then show me the top 10 datasets by query count over the last hour."

mock_data: |
  meta scuba.dataset search response for "scuba query performance":
    success: true
    dataset: "asset://scuba.dataset/scuba_queries"
    error: null
  meta scuba.dataset info response for scuba_queries:
    success: true
    dataset_info:
      dataset_name: scuba_queries
      description: "Query logs for all Scuba queries"
      columns:
        - column_name: dataset
          column_type: STRING
          description: "Target dataset name"
        - column_name: query_type
          column_type: STRING
          description: "Type of query"
        - column_name: cpu_time
          column_type: INTEGER
          format: "%M"
          description: "CPU time consumed"
        - column_name: query_source
          column_type: STRING
          description: "Source of the query"
      total_columns_in_dataset: 145
  meta scuba.dataset query response:
    scuba_url: "https://www.internalfb.com/intern/scuba/query/?dataset=scuba_queries&pool=uber&view=table&drillstate=N4IgxgDgFghgTg..."
    results:
      dataset              | COUNT
      scuba_queries        | 15234
      intern_page_views    | 12100
      web_requests         | 9876

intercept_patterns:
  - "meta scuba"

critical_requirements:
  - id: calls_dataset_search
    type: tool_called
    tool_name: Bash
    description: "Agent uses meta scuba.dataset search for discovery"
    arguments:
      command: "meta scuba.dataset search"
  - id: calls_dataset_info
    type: tool_called
    tool_name: Bash
    description: "Agent calls meta scuba.dataset info to explore the schema"
    arguments:
      command: "meta scuba.dataset info"
  - id: calls_query
    type: tool_called
    tool_name: Bash
    description: "Agent runs meta scuba.dataset query with correct parameters"
    arguments:
      command: "meta scuba.dataset query"

quality_factors:
  - id: strips_prefix
    description: "Strips the asset://scuba.dataset/ prefix from the dataset name"
    weight: 0.4
  - id: describes_schema
    description: "Summarizes the dataset schema for the user"
    weight: 0.3
  - id: presents_results
    description: "Shows query results with Scuba URL"
    weight: 0.3
