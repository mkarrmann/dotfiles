id: gdocs-export-001
name: Export to PDF
category: export
prompt: Export https://docs.google.com/document/d/1abc123/edit as a PDF to /tmp/report.pdf
description: Tests exporting a document to PDF format
expected_behavior: Agent uses export with --format pdf and --output path
eval_target: response
mock_data: |
  Document ID: 1abc123
  Title: Quarterly Report
  Export result: Document exported to /tmp/report.pdf (PDF format, 245 KB).
fail_on_unmocked_command: true
intercept_patterns:
- 'meta google.docs '
- 'devfeature '
- google_api.py
intercept_mcp_tools:
- mcp__google_docs__google_docs
- mcp__plugin_meta_mux__knowledge_filtered_search
quality_criteria:
  required_present: []
  required_absent:
  - I cannot
  - I don't know
  semantic_checks:
  - question: Did the agent export the document to PDF at the specified path?
    weight: 3
    rubric:
      5: Agent exported to /tmp/report.pdf in PDF format
      3: Agent exported but path or format was different
      1: Agent did not export the document
project: gdocs-evals
target_skills:
- fbcode/claude-templates/components/skills/google-docs/SKILL.md
working_directory: ~/fbsource/fbcode
