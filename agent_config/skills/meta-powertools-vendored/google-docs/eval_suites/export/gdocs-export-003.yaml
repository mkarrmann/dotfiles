id: gdocs-export-003
name: Export to plain text
category: export
prompt: Get the plain text content of https://docs.google.com/document/d/1abc123/edit and save it to /tmp/doc.txt
description: Tests exporting a document to plain text
expected_behavior: Agent uses export with --format plain_text or txt
eval_target: response
mock_data: |
  Document ID: 1abc123
  Title: Meeting Notes
  Export result: Document exported to /tmp/doc.txt (plain text format, 3.2 KB).
fail_on_unmocked_command: true
intercept_patterns:
- 'meta google.docs '
- 'devfeature '
- google_api.py
intercept_mcp_tools:
- mcp__google_docs__google_docs
- mcp__plugin_meta_mux__knowledge_filtered_search
quality_criteria:
  required_present: []
  required_absent:
  - I cannot
  - I don't know
  semantic_checks:
  - question: Did the agent export the document as plain text to /tmp/doc.txt?
    weight: 3
    rubric:
      5: Agent exported to /tmp/doc.txt in plain text format
      3: Agent exported but path or format was different
      1: Agent did not export the document
project: gdocs-evals
target_skills:
- fbcode/claude-templates/components/skills/google-docs/SKILL.md
working_directory: ~/fbsource/fbcode
