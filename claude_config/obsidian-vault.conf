# Obsidian vault root — single source of truth for shell, Python, and Nvim.
# Override per-machine via OBSIDIAN_VAULT env var or by editing this file
# in your local/config layer (not tracked in dotfiles).
#
# Nvim reads this via lib/agent-session.lua:resolve_vault_root() and sets
# vim.g.obsidian_vault, which obsidian.nvim and agent-manager consume.
OBSIDIAN_VAULT_ROOT="${OBSIDIAN_VAULT:-$HOME/obsidian}"
