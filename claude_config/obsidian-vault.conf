# Obsidian vault root — single source of truth for shell + Python consumers.
# Override per-machine via OBSIDIAN_VAULT env var or by editing this file
# in your local/config layer (not tracked in dotfiles).
#
# Nvim uses vim.g.obsidian_vault (set in nvim/local/config/) and falls back
# to this value via lib/agent-session.lua.
OBSIDIAN_VAULT_ROOT="${OBSIDIAN_VAULT:-$HOME/obsidian}"
