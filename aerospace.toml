config-version = 2
start-at-login = true
default-root-container-layout = 'accordion'
default-root-container-orientation = 'vertical'

after-startup-command = [
    'exec-and-forget /bin/bash -l -c "sleep 3 && startup-windows"',
    'exec-and-forget sketchybar',
]

exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED="$AEROSPACE_FOCUSED_WORKSPACE" PREV="$AEROSPACE_PREV_WORKSPACE"'
]

# Persistent workspaces: 1-9, A, B, Z (overflow)
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9"]

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Pin all defined workspaces to the main monitor
[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'main'
5 = 'main'
6 = 'main'
7 = 'main'
8 = 'main'
9 = 'main'

# Zero gaps, tiles layout
[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.right = 0
outer.top = 22
outer.bottom = 0

[key-mapping]
preset = 'qwerty'

# ── Mode: main ───────────────────────────────────────────────────────

[mode.main.binding]

# Workspace switching
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-keypad1 = 'workspace 1'
alt-keypad2 = 'workspace 2'
alt-keypad3 = 'workspace 3'
alt-keypad4 = 'workspace 4'
alt-keypad5 = 'workspace 5'
alt-keypad6 = 'workspace 6'
alt-keypad7 = 'workspace 7'
alt-keypad8 = 'workspace 8'
alt-keypad9 = 'workspace 9'
alt-a = 'workspace A'
alt-b = 'workspace B'
alt-z = 'workspace Z'

# Move window to workspace (arrange-workspaces rebuilds the accordion on the
# target workspace, since move-node-to-workspace doesn't trigger on-window-detected)
alt-shift-1 = ['move-node-to-workspace 1', 'exec-and-forget arrange-workspaces --force 1']
alt-shift-2 = ['move-node-to-workspace 2', 'exec-and-forget arrange-workspaces --force 2']
alt-shift-3 = ['move-node-to-workspace 3', 'exec-and-forget arrange-workspaces --force 3']
alt-shift-4 = ['move-node-to-workspace 4', 'exec-and-forget arrange-workspaces --force 4']
alt-shift-5 = ['move-node-to-workspace 5', 'exec-and-forget arrange-workspaces --force 5']
alt-shift-6 = ['move-node-to-workspace 6', 'exec-and-forget arrange-workspaces --force 6']
alt-shift-7 = ['move-node-to-workspace 7', 'exec-and-forget arrange-workspaces --force 7']
alt-shift-8 = ['move-node-to-workspace 8', 'exec-and-forget arrange-workspaces --force 8']
alt-shift-9 = ['move-node-to-workspace 9', 'exec-and-forget arrange-workspaces --force 9']
alt-shift-keypad1 = ['move-node-to-workspace 1', 'exec-and-forget arrange-workspaces --force 1']
alt-shift-keypad2 = ['move-node-to-workspace 2', 'exec-and-forget arrange-workspaces --force 2']
alt-shift-keypad3 = ['move-node-to-workspace 3', 'exec-and-forget arrange-workspaces --force 3']
alt-shift-keypad4 = ['move-node-to-workspace 4', 'exec-and-forget arrange-workspaces --force 4']
alt-shift-keypad5 = ['move-node-to-workspace 5', 'exec-and-forget arrange-workspaces --force 5']
alt-shift-keypad6 = ['move-node-to-workspace 6', 'exec-and-forget arrange-workspaces --force 6']
alt-shift-keypad7 = ['move-node-to-workspace 7', 'exec-and-forget arrange-workspaces --force 7']
alt-shift-keypad8 = ['move-node-to-workspace 8', 'exec-and-forget arrange-workspaces --force 8']
alt-shift-keypad9 = ['move-node-to-workspace 9', 'exec-and-forget arrange-workspaces --force 9']
alt-shift-a = 'move-node-to-workspace A'
alt-shift-b = 'move-node-to-workspace B'
alt-shift-z = 'move-node-to-workspace Z'

# Focus direction
alt-h = 'focus --boundaries-action wrap-around-the-workspace left'
alt-j = 'focus --boundaries-action wrap-around-the-workspace down'
alt-k = 'focus --boundaries-action wrap-around-the-workspace up'
alt-l = 'focus --boundaries-action wrap-around-the-workspace right'

# Move window in direction
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Focus monitor
alt-ctrl-j = 'focus-monitor down'
alt-ctrl-h = 'focus-monitor left'
alt-ctrl-l = 'focus-monitor right'
alt-ctrl-k = 'focus-monitor up'

# Cycle through workspaces
alt-i = 'workspace next --wrap-around'
alt-u = 'workspace prev --wrap-around'

# Workspace back-and-forth / move workspace to monitor
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Enter service mode
alt-shift-semicolon = 'mode service'

# ── Mode: service ────────────────────────────────────────────────────

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# Layout switching
t = ['layout tiles horizontal', 'mode main']
a = ['layout accordion', 'mode main']

# ── On window detected: best-effort workspace assignment ─────────────
# The startup-windows script handles reliable placement; these rules
# catch windows that appear outside the script (e.g. manual opens).

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
if.window-title-regex-substring = '^Local MacOS'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
if.window-title-regex-substring = '^FTW: main1'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
if.window-title-regex-substring = '^FTW: fbsource1'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
if.window-title-regex-substring = '^FTW: fbsource2'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
if.window-title-regex-substring = '^CCO: main1'
run = 'move-node-to-workspace 5'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
if.window-title-regex-substring = '^CCO: fbsource1'
run = 'move-node-to-workspace 6'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
if.window-title-regex-substring = '^CCO: fbsource2'
run = 'move-node-to-workspace 7'

# ── Auto-accordion: move new windows into the RHS accordion ──────────
# Uses a helper script that checks workspace, title, and lock file
# to avoid interfering with startup-windows or Orchest sidebar windows.

[[on-window-detected]]
if.during-aerospace-startup = false
run = 'exec-and-forget ~/bin/auto-accordion'

