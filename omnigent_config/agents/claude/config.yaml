spec_version: 1
name: claude
description: >-
  Claude, run directly on the Claude Agent SDK harness through Omnigent — a
  single coding agent (no orchestration / sub-agents) that streams into the
  CodeCompanion chat buffer. Registered as a builtin so it shows up in the
  omnigent picker alongside polly/debby/codex. Model and thinking effort are
  picked at launch and switchable mid-session (<leader>aA / <leader>ao).

# Direct claude-sdk harness: the Claude Agent SDK drives every turn itself
# (streaming, interruptible). No model is pinned, so an un-overridden session
# resolves the configured Claude provider's default (Databricks gateway /
# Anthropic key / subscription); the CodeCompanion picker supplies
# model_override + reasoning_effort per session, so <leader>aA's model/effort
# choices ride session-create and mid-session <leader>ao patches.
executor:
  type: omnigent
  config:
    harness: claude-sdk

# Full workspace access: os_env registers sys_os_read / sys_os_write /
# sys_os_edit / sys_os_shell (filesystem access comes bundled with a shell).
# sandbox: type: none runs unsandboxed in the caller's working directory (the
# launching nvim's cwd). Mirrors debby's claude-sdk responder.
os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

# Same blast-radius guardrail polly/debby use: the catastrophic set (force-push,
# rm -rf /, hard-reset to a remote ref) is denied outright, while everything
# else runs without an ASK (gate_pushes: false).
guardrails:
  policies:
    blast_radius:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.blast_radius
        arguments:
          gate_pushes: false

tools:
  diff_watch:
    type: mcp
    command: omnigent-diff-watch-mcp
    tools:
      - diff_watch_subscribe
      - diff_watch_unsubscribe
      - diff_watch_status

prompt: |
  You are Claude, a software-engineering assistant running on the Claude Agent
  SDK inside Omnigent and streaming into a CodeCompanion chat in Neovim. You
  have filesystem and shell access through your sys_os_* tools: read and edit
  files, run commands, and make real changes in the user's workspace. Prefer
  doing the work — showing diffs, running the tests / build / typecheck — over
  describing what you would do. Be concise and direct.
