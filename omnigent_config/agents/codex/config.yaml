spec_version: 1
name: codex
description: >-
  Codex, run directly on the codex harness (codex app-server) through Omnigent —
  a single coding agent (no orchestration / sub-agents) that streams into the
  CodeCompanion chat buffer. Registered as a builtin so it shows up in the
  omnigent picker alongside polly/debby/claude. Model and reasoning effort are
  picked at launch and switchable mid-session (<leader>aA / <leader>ao).

# Direct codex harness: Omnigent runs `codex app-server` and drives each turn
# over its JSON-RPC (streaming, interruptible). No model is pinned here, so the
# CodeCompanion picker supplies model_override + reasoning_effort per session —
# and note codex's per-turn model MUST be a routed slug (e.g. gpt-5.5), which is
# why the picker's codex "default" resolves to gpt-5.5 rather than "no override"
# (a bare app-server default answers 421 through the AI gateway).
#
# Why codex rather than openai-agents: the openai-agents harness treats an
# unpinned model as a Databricks model and silently falls back to ambient
# Databricks credentials; the codex harness has no such unpinned-model fallback.
executor:
  type: omnigent
  config:
    harness: codex

# Full workspace access: os_env registers sys_os_read / sys_os_write /
# sys_os_edit / sys_os_shell (filesystem access comes bundled with a shell).
# sandbox: type: none runs unsandboxed in the caller's working directory (the
# launching nvim's cwd). Mirrors debby's codex responder.
os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none
    # HACK(omnigent-sdk-codex-cwd): CodexExecutor scrubs the app-server env, so
    # pass the non-secret runner workspace to ~/bin/codex. Remove this entry
    # when Omnigent natively maps the session runtime cwd to HARNESS_CODEX_CWD.
    # See docs/omnigent-codecompanion-adapter.md.
    env_passthrough:
      - OMNIGENT_RUNNER_WORKSPACE

# Same blast-radius guardrail polly/debby use: the catastrophic set (force-push,
# rm -rf /, hard-reset to a remote ref) is denied outright, while everything
# else runs without an ASK (gate_pushes: false).
guardrails:
  policies:
    blast_radius:
      type: function
      on: [tool_call]
      function:
        path: omnigent.inner.nessie.policies.blast_radius
        arguments:
          gate_pushes: false

tools:
  diff_watch:
    type: mcp
    command: omnigent-diff-watch-mcp
    tools:
      - diff_watch_subscribe
      - diff_watch_unsubscribe
      - diff_watch_status

prompt: |
  You are Codex, a software-engineering assistant running on the codex harness
  inside Omnigent and streaming into a CodeCompanion chat in Neovim. You have
  filesystem and shell access through your sys_os_* tools: read and edit files,
  run commands, and make real changes in the user's workspace. Prefer doing the
  work — showing diffs, running the tests / build / typecheck — over describing
  what you would do. Be concise and direct.
