# Omnigent server config, passed via `--config` from the systemd unit
# (~/dotfiles/systemd/omnigent-server.service).
#
# The published uv-tool install reads NO config unless `--config` is given, so
# everything below is opt-in. It layers out-of-tree policies onto the server
# without patching the installed package. The policy module root is placed on
# PYTHONPATH by the systemd unit.

# Extra policy modules to import at startup (dotted module paths, resolved via
# PYTHONPATH). Their POLICY_REGISTRY entries are merged into the registry.
policy_modules:
  - capture_diff

# Server-wide default policies, appended after per-agent policies for EVERY
# session. `type: function` self-selects its phase (a tool_result capture here),
# so no `on:` is needed.
policies:
  approve_diff_watch_subscription:
    type: function
    function: capture_diff.approve_diff_watch_subscription

  diff_watch_preferences:
    type: function
    function: capture_diff.diff_watch_preference_policy
    set_labels:
      - omnigent.diff.watch

  capture_diff:
    type: function
    function:
      path: capture_diff.capture_labels_policy
      arguments:
        patterns:
          # Phabricator diff created by any tool -> omnigent.diff.number = D<n>.
          omnigent.diff.number: 'Differential Revision:[^\n]*?(D\d+)'
    # Whitelist of label keys this policy may write.
    set_labels:
      - omnigent.diff.number
