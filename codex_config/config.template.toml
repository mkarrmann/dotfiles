# Shared Codex defaults. Machine-specific overrides belong in
# ~/.codex/config.local.toml, which init.sh appends after generating
# ~/.codex/config.toml from this template.
model = "gpt-5.4"
model_reasoning_effort = "high"

# Note: [features] is owned by ~/.codex/config.local.toml — codex itself
# re-serializes it there, so declaring it here would create a duplicate
# section after init.sh's concatenation.
